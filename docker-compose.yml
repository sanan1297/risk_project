services:
  mlflow:
    image: ghcr.io/mlflow/mlflow:v3.14.0
    container_name: risk-mlflow
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow
    environment:
      - MLFLOW_TRACKING_URI=http://0.0.0.0:5000
      - MLFLOW_SERVER_ALLOWED_HOSTS=*
    command: >
      mlflow server
      --backend-store-uri sqlite:///mlflow/mlflow.db
      --default-artifact-root /mlflow/artifacts
      --host 0.0.0.0
      --port 5000
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  backend:
    build: .
    image: risk-predictor:latest
    container_name: risk-backend
    ports:
      - "8003:8003"
    volumes:
      - history_data:/app/data
    environment:
      - HISTORY_DB_PATH=/app/data/history.db
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - MLFLOW_EXPERIMENT_NAME=risk-predictor
      - MLFLOW_MODEL_NAME=risk-predictor-svr
    depends_on:
      mlflow:
        condition: service_started
    command: >
      uv run uvicorn backend.main:app
      --host 0.0.0.0 --port 8003
    healthcheck:
      test: ["CMD", "uv", "run", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8003/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  frontend:
    build: .
    image: risk-predictor:latest
    container_name: risk-frontend
    ports:
      - "8501:8501"
    depends_on:
      backend:
        condition: service_healthy
    environment:
      - API_URL=http://backend:8003
    command: >
      uv run streamlit run frontend/streamlit_app.py
      --server.port 8501
      --server.address 0.0.0.0
      --server.headless true
    restart: unless-stopped

volumes:
  history_data:
  mlflow_data:
